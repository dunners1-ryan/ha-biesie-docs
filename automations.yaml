            |

            Load Shedding "{{states(''sensor.load_shedding_area_jhbcitypower3_11_weltevredenpark'')}}"
            & Eskom Stage "{{states(''sensor.load_shedding_stage_eskom'')}}" |

            Inverter load: {{states(''sensor.inverter_power'')}}W | Battery SOC: {{states(''sensor.inverter_battery_soc'')}}%
            |

            Solar power: {{states(''sensor.inverter_pv_power'')}}W | Grid feed: {{states(''sensor.inverter_grid_power'')}}W
            |'
          title: Inverter Control - Changes
          data:
            actions:
            - action: URI
              title: Open Solar Inverter
              uri: /dashboard-home/energy-control/
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_5527
        data:
          title: Inverter Control (Changes)
          message: 'Inverter set to *{{states(''input_select.inverter_solar_appliance_mode_helper'')}}*
            Appliance Mode (Appliances off | Battery First | Grid Charge).

            Inverter Solar Mode is *{{states(''input_select.inverter_solar_mode_helper'')}}*
            |

            Solar Hour: {{states(''sensor.solcast_pv_forecast_forecast_this_hour'')}}Wh
            | Today: *{{states(''sensor.solcast_pv_forecast_forecast_today'')}}kWh*
            |

            Load Shedding *{{states(''sensor.load_shedding_area_jhbcitypower3_11_weltevredenpark'')}}*
            & Eskom Stage *{{states(''sensor.load_shedding_stage_eskom'')}}* |

            Inverter load: *{{states(''sensor.inverter_power'')}}W* | Battery SOC:
            *{{states(''sensor.inverter_battery_soc'')}}%* |

            Solar power: *{{states(''sensor.inverter_pv_power'')}}W* | Grid feed:
            *{{states(''sensor.inverter_grid_power'')}}W* |'
    - conditions:
      - alias: If Medium SOC, Medium Solar Hour Forecast
        condition: and
        conditions:
        - condition: numeric_state
          entity_id: sensor.inverter_battery_soc
          above: input_number.inverter_battery_soc_prog5_low_trigger
          below: input_number.inverter_battery_soc_prog5_high_trigger
        - condition: numeric_state
          entity_id: sensor.solcast_pv_forecast_forecast_this_hour
          above: input_number.this_hour_low_solar_forecast_trigger
          enabled: false
        - alias: If Inverter mode not already set to Medium Solar
          condition: template
          value_template: '{{states(''input_select.inverter_solar_appliance_mode_helper'')
            not in [''Medium Solar''] }}'
          enabled: true
      sequence:
      - action: scene.turn_on
        data: {}
        target:
          entity_id: scene.medium_solar_forecast
      - alias: Change Inverter Solar Appliance Mode to Medium Solar
        action: input_select.select_option
        metadata: {}
        data:
