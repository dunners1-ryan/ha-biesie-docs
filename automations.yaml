- id: '1741007573197'
  alias: Load Shedding Inverter Scene Switcher
  description: Change Inverter Settings Based on load shedding level
  triggers:
  - entity_id: input_text.test_eskom_load_shedding
    trigger: state
    enabled: false
  - trigger: state
    entity_id:
    - sensor.load_shedding_stage_eskom
    attribute: stage
    enabled: true
    for:
      hours: 0
      minutes: 15
      seconds: 0
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.to_state.state in [''No Load Shedding''] and trigger.from_state.state
          in [''Stage 1'', ''Stage 2'', ''Stage 3'', ''Stage 4'', ''Stage 5'', ''Stage
          6'', ''Stage 7'', ''Stage 8''] }}'
      sequence:
      - action: scene.turn_on
        data: {}
        target:
          entity_id: scene.no_load_shedding
      - action: notify.STD_Critical
        data:
          message: 'Inverter settings changed to No Load Shedding - no grid charge;

            Current load is {{ states(''sensor.inverter_power'')}}W

            Current grid load is {{ states(''sensor.inverter_grid_power'')}}W

            Solar power is {{states(''sensor.inverter_pv_power'')}}W

            Battery SOC is {{ states(''sensor.inverter_battery_soc'')}}%'
        enabled: true
      - action: notify.whatsapp
        data:
          message: "Inverter settings changed to No Load Shedding - no grid charge;\n
            Current load is {{ states('sensor.inverter_power')}}W \n Current grid
            load is {{ states('sensor.inverter_grid_power')}}W \n Solar power is {{
            states('sensor.inverter_pv_power')}}W  \n Battery SOC is {{ states('sensor.inverter_battery_soc')}}%"
          title: Load Shedding Status Alert
        enabled: false
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_5527
        data:
          title: Load Shedding Status Alert
          message: 'Inverter settings changed to No Load Shedding - no grid charge;

            Current load is {{ states(''sensor.inverter_power'')}}W

            Current grid load is {{ states(''sensor.inverter_grid_power'')}}W

            Solar power is {{ states(''sensor.inverter_pv_power'')}}W

            Battery SOC is {{ states(''sensor.inverter_battery_soc'')}}%'
        enabled: true
      alias: If Stage is equal to No Load Shedding
    - conditions:
      - condition: template
        value_template: '{{ trigger.to_state.state in [''Stage 1'', ''Stage 2'', ''Stage
          3''] }} '
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.stage_2_load_shedding
        data: {}
      - action: notify.STD_Critical
        data:
          message: 'Inverter settings changed to Stage 2 Load Shedding - Grid charging;

            Current load is {{ states(''sensor.inverter_power'')}}W

            Current grid load is {{ states(''sensor.inverter_grid_power'')}}W

            Solar power is {{ states(''sensor.inverter_pv_power'')}}W

            Battery SOC is {{ states(''sensor.inverter_battery_soc'')}}%"'
      - action: notify.whatsapp
        data:
          message: Inverter settings changed to Stage 2 Load Shedding - Grid charging;
            \n Current load is {{states('sensor.inverter_power')}}W \n Current grid
            load is {{states('sensor.inverter_grid_power')}}W \n  Solar power is {{states('sensor.inverter_pv_power')}}W
            \n  Battery SOC is {{states('sensor.inverter_battery_soc')}}%
          title: Load Shedding Status Alert
        enabled: false
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_5527
        data:
          title: Load Shedding Status Alert
          message: 'Inverter settings changed to Stage 2 Load Shedding - Grid charging;

            Current load is {{ states(''sensor.inverter_power'')}}W

            Current grid load is {{ states(''sensor.inverter_grid_power'')}}W

            Solar power is {{ states(''sensor.inverter_pv_power'')}}W

            Battery SOC is {{ states(''sensor.inverter_battery_soc'')}}%'
        enabled: true
      alias: If Stage is 1, 2 or 3
    - conditions:
      - condition: template
        value_template: '{{ trigger.to_state.state == ''Stage 4'' }}'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.stage_4_load_shedding
        data: {}
      - action: notify.STD_Critical
        data:
          message: 'Inverter settings changed to Stage 4 Load Shedding - Grid

            Current load is {{ states(''sensor.inverter_power'')}}W

            Current grid load is {{ states(''sensor.inverter_grid_power'')}}W

            Solar power is {{ states(''sensor.inverter_pv_power'')}}W

            Battery SOC is {{ states(''sensor.inverter_battery_soc'')}}%"'
      - action: notify.whatsapp
        data:
          message: Inverter settings changed to Stage 4 Load Shedding - Grid Charging
            + Priority Charge;\n Current load is {{ states('sensor.inverter_power')}}W\n
            Current grid load is {{ states('sensor.inverter_grid_power')}}W\n Solar
            power is {{ states('sensor.inverter_pv_power')}}W\n Battery SOC is {{
            states('sensor.inverter_battery_soc')}}%
          title: Load Shedding Status Alert
        enabled: false
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_5527
        data:
          title: Load Shedding Status Alert
          message: 'Inverter settings changed to Stage 4 Load Shedding - Grid Charging
            + Priority Charge;

            Current load is {{ states(''sensor.inverter_power'')}}W

            Current grid load is {{ states(''sensor.inverter_grid_power'')}}W

            Solar power is {{ states(''sensor.inverter_pv_power'')}}W

            Battery SOC is {{ states(''sensor.inverter_battery_soc'')}}%'
        enabled: true
      alias: If Stage is equal to 4
    - conditions:
      - condition: template
        value_template: '{{ trigger.to_state.state >= ''Stage 5'' }}'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.stage_6_load_shedding_priority_charge
        data: {}
      - action: notify.STD_Critical
        data:
          message: 'Inverter settings changed to Stage 6 Load Shedding - No Time +
            Priority Charge;

            Current load is {{ states(''sensor.inverter_power'')}}W

            Current grid load is {{ states(''sensor.inverter_grid_power'')}}W

            Solar power is {{ states(''sensor.inverter_pv_power'')}}W

            Battery SOC is {{ states(''sensor.inverter_battery_soc'')}}%"'
      - action: notify.whatsapp
        data:
          message: Inverter settings changed to Stage 6 Load Shedding - No Time +
            Priority Charge;\n Current load is {{ states('sensor.inverter_power')}}W\n
            Current grid load is {{ states('sensor.inverter_grid_power')}}W\n Solar
            power is {{ states('sensor.inverter_pv_power')}}W\n Battery SOC is {{
            states('sensor.inverter_battery_soc')}}%
          title: Load Shedding Status Alert
        enabled: false
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_5527
        data:
          title: Load Shedding Status Alert
          message: '"Inverter settings changed to Stage 6 Load Shedding - No Time
            +  Priority Charge;

            Current load is {{ states(''sensor.inverter_power'')}}W

            Current grid load is {{ states(''sensor.inverter_grid_power'')}}W

            Solar power is {{ states(''sensor.inverter_pv_power'')}}W

            Battery SOC is {{ states(''sensor.inverter_battery_soc'')}}%"

            '
        enabled: true
      alias: If Stage is 5 and above
    default: []
  mode: single
- id: '1741870692661'
  alias: Solar Forecast Today Update Inverter Scenes 8am-1pm
  description: ''
  triggers:
  - alias: Time between 8am & 1pm
    trigger: template
    value_template: '{{ now().hour in [8,12] and now().minute % 60 == 0 }}'
    enabled: false
  - trigger: time_pattern
    hours: /1
  conditions:
  - condition: time
    after: 08:00:00
    before: 01:00:00
  actions:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: numeric_state
          entity_id: sensor.solcast_pv_forecast_forecast_today
          below: input_number.low_solar_forecast_trigger
        - condition: state
          entity_id: input_select.inverter_scene_state_helper
          state: High Solar
          enabled: false
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.low_solar_forecast
        data: {}
      - action: input_select.select_option
        metadata: {}
        data:
          option: Low Solar
        target:
          entity_id: input_select.inverter_scene_state_helper
        alias: Change Inverter Helper to Low Solar
      - action: notify.STD_Information
        metadata: {}
        data:
          message: 'Inverter set to Low Solar Forecast (Include grid charge)

            Solar Forecast today: {{states(''sensor.solcast_pv_forecast_forecast_today'')}}kWh
            |

            Inverter load: {{states(''sensor.inverter_power'')}}W |

            Grid feed: {{states(''sensor.inverter_grid_power'')}}W |

            Solar power: {{states(''sensor.inverter_pv_power'')}}W |

            Battery SOC: {{states(''sensor.inverter_battery_soc'')}}%'
          title: Inverter Control
          data:
            actions:
            - action: URI
              title: Open Solar Inverter
              uri: /dashboard-home/energy-control/
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_5527
        data:
          title: Inverter Control
          message: 'Inverter set to Low Solar Forecast (Include grid charge)

            Solar Forecast today: {{states(''sensor.solcast_pv_forecast_forecast_today'')}}kWh
            |

            Inverter load: {{states(''sensor.inverter_power'')}}W |

            Grid feed: {{states(''sensor.inverter_grid_power'')}}W |

            Solar power: {{states(''sensor.inverter_pv_power'')}}W |

            Battery SOC: {{states(''sensor.inverter_battery_soc'')}}%'
    - conditions:
      - condition: and
        conditions:
        - condition: numeric_state
          entity_id: sensor.solcast_pv_forecast_forecast_today
          above: input_number.high_solar_forecast_trigger
        - condition: state
          entity_id: input_select.inverter_scene_state_helper
          state: Low Solar
          enabled: false
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.high_solar_forecast
        data: {}
      - action: input_select.select_option
        metadata: {}
        data:
          option: High Solar
        target:
          entity_id: input_select.inverter_scene_state_helper
        alias: Change Inverter Helper to High Solar
      - action: notify.STD_Information
        metadata: {}
        data:
          title: Inverter Control
          message: 'Inverter set to High Solar Forecast Scene (No grid charge)

            Solar Forecast today: {{states(''sensor.solcast_pv_forecast_forecast_today'')}}kWh
            |

            Inverter load: {{states(''sensor.inverter_power'')}}W |

            Grid feed: {{states(''sensor.inverter_grid_power'')}}W |

            Solar power: {{states(''sensor.inverter_pv_power'')}}W |

            Battery SOC: {{states(''sensor.inverter_battery_soc'')}}%'
          data:
            actions:
            - action: URI
              title: Open Solar Inverter
              uri: /dashboard-home/energy-control/
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_5527
        data:
          title: Inverter Control
          message: 'Inverter set to High Solar Forecast Scene (No grid charge)

            Solar Forecast today: {{states(''sensor.solcast_pv_forecast_forecast_today'')}}kWh
            |

            Inverter load: {{states(''sensor.inverter_power'')}}W |

            Grid feed: {{states(''sensor.inverter_grid_power'')}}W |

            Solar power: {{states(''sensor.inverter_pv_power'')}}W |

            Battery SOC: {{states(''sensor.inverter_battery_soc'')}}%'
    default:
    - action: notify.send_message
      target:
        entity_id: notify.telegram_bot_5527
      data:
        title: Inverter Control No Changes
        message: 'Inverter settings remain the same at {{states(''input_select.inverter_scene_state_helper'')}}
          Forecast Scene

          Solar Forecast today: {{states(''sensor.solcast_pv_forecast_forecast_today'')}}kWh
          |

          Inverter load: {{states(''sensor.inverter_power'')}}W |

          Grid feed: {{states(''sensor.inverter_grid_power'')}}W |

          Solar power: {{states(''sensor.inverter_pv_power'')}}W |

          Battery SOC: {{states(''sensor.inverter_battery_soc'')}}%'
  mode: single
- id: '1741870952191'
  alias: Solar Forecast Check Update Appliances 2pm-5pm
  description: ''
  triggers:
  - trigger: time
    at: '14:02:00'
  - trigger: time_pattern
    enabled: true
    minutes: '2'
  conditions:
  - condition: time
    after: '14:00:00'
    before: '17:00:00'
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    - sun
  actions:
  - choose:
    - conditions:
      - alias: If Low SOC, Low Solar Hour Forecast
        condition: and
        conditions:
        - condition: numeric_state
          entity_id: sensor.inverter_battery_soc
          below: input_number.inverter_battery_soc_prog5_low_trigger
        - condition: numeric_state
          entity_id: sensor.solcast_pv_forecast_forecast_this_hour
          below: input_number.this_hour_low_solar_forecast_trigger
        - alias: If solar conditions are not high for the day
          condition: template
          value_template: '{{states(''input_select.inverter_solar_mode_helper'') not
            in [''High Solar''] }}'
          enabled: true
        - alias: If Inverter mode not already set to Low Solar
          condition: template
          value_template: '{{states(''input_select.inverter_solar_appliance_mode_helper'')
            not in [''Low Solar''] }}'
          enabled: true
      sequence:
      - action: scene.turn_on
        data: {}
        target:
          entity_id: scene.low_solar_inverter_mode
      - alias: Change Inverter Solar Appliance Mode to Low Solar
        action: input_select.select_option
        metadata: {}
        data:
          option: Low Solar
        target:
          entity_id: input_select.inverter_solar_appliance_mode_helper
      - action: notify.STD_Information
        metadata: {}
        data:
          message: 'Inverter set to "{{states(''input_select.inverter_solar_appliance_mode_helper'')}}"
            Appliance Mode (Appliances off | Battery First | Grid Charge).

            Inverter Solar Mode is "{{states(''input_select.inverter_solar_mode_helper'')}}"
            |

            Solar Hour: {{states(''sensor.solcast_pv_forecast_forecast_this_hour'')}}Wh
